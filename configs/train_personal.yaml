## 📋 训练配置文件模板

创建 `configs/train_personal.yaml`：

```yaml
# 农田干裂检测 - 个人配置
dataset:
  yaml_path: "data/roboflow/data.yaml"
  train_split: "train"
  val_split: "valid"
  test_split: "test"
  num_classes: 3  # 轻度、中度、重度干裂
  class_names: ["mild", "moderate", "severe"]

model:
  name: "yolov10n"  # 使用nano版本，适合4GB显存
  pretrained: true
  num_classes: 3
  input_size: [512, 512]  # 降低分辨率以节省显存
  use_attention: true
  
training:
  epochs: 300
  batch_size: 4  # 适配4GB显存
  image_size: [512, 512]
  num_workers: 2  # Windows系统建议2-4
  
  # 优化器配置
  optimizer:
    name: "AdamW"
    lr: 0.001
    weight_decay: 0.0005
    
  # 学习率调度
  scheduler:
    name: "CosineAnnealingLR"
    T_max: 300
    eta_min: 0.0001
    
  # 显存优化
  amp:
    enabled: true  # 混合精度训练
    
  gradient_accumulation:
    enabled: true
    steps: 4  # 模拟batch_size=16的效果
    
  # 早停策略
  early_stopping:
    enabled: true
    patience: 50
    min_delta: 0.001

# 数据增强（针对农田图像优化）
data_augmentation:
  hsv_h: 0.015  # 色调
  hsv_s: 0.7    # 饱和度
  hsv_v: 0.4    # 亮度
  degrees: 10   # 旋转
  translate: 0.1  # 平移
  scale: 0.5    # 缩放
  shear: 2      # 剪切
  perspective: 0.0  # 透视
  flipud: 0.0   # 上下翻转
  fliplr: 0.5   # 左右翻转
  mosaic: 1.0   # 马赛克增强
  mixup: 0.0    # mixup增强
  copy_paste: 0.0  # 复制粘贴

# 验证配置
validation:
  freq: 10  # 每10个epoch验证一次
  save_best_only: true
  metric: "mAP@0.5"
  
# 检查点配置
checkpoint:
  save_dir: "outputs/checkpoints"
  save_freq: 50  # 每50个epoch保存一次
  keep_last: 3   # 保留最后3个检查点
  
# 日志配置
logging:
  level: "INFO"
  save_dir: "outputs/logs"
  tensorboard: true
  wandb: false
  
# 硬件配置
hardware:
  device: "cuda"  # 或 "cpu"
  gpu_memory_limit: 4096  # 4GB显存限制
  mixed_precision: true
  
# 性能监控
monitoring:
  gpu_utilization: true
  memory_usage: true
  training_time: true
```

## 🎯 类别定义建议

基于您的项目"drought-opbc7"，建议定义以下三个类别：

```yaml
# data.yaml 中的类别定义
nc: 3
names: ['mild', 'moderate', 'severe']

# 类别详细说明
class_descriptions:
  mild: 
    name: "轻度干裂"
    description: "裂缝宽度 < 5mm，深度 < 10mm"
    color: "#00FF00"  # 绿色
    
  moderate:
    name: "中度干裂" 
    description: "裂缝宽度 5-20mm，深度 10-30mm"
    color: "#FFA500"  # 橙色
    
  severe:
    name: "重度干裂"
    description: "裂缝宽度 > 20mm，深度 > 30mm"  
    color: "#FF0000"  # 红色
```

## 📊 训练参数建议

### 针对您的硬件配置（4GB显存）

```python
# 推荐的训练参数
BATCH_SIZE = 4          # 基础批次大小
GRADIENT_ACCUMULATION = 4  # 梯度累积步数
EFFECTIVE_BATCH_SIZE = BATCH_SIZE * GRADIENT_ACCUMULATION  # 16

IMAGE_SIZE = 512       # 图像尺寸
EPOCHS = 300           # 训练轮数
LEARNING_RATE = 0.001  # 学习率

# 内存优化设置
MIXED_PRECISION = True  # 混合精度训练
CACHE_IMAGES = False    # 不缓存图像（节省内存）
NUM_WORKERS = 2        # 数据加载进程数
```

## 🔧 训练脚本调用

```bash
# 基础训练
python train.py --config configs/train_personal.yaml

# 指定设备
cuda:0  # 使用GPU
python train.py --config configs/train_personal.yaml --device cuda:0

# 恢复训练
python train.py --config configs/train_personal.yaml --resume outputs/checkpoints/last.pt

# 仅验证
python train.py --config configs/train_personal.yaml --validate
```

## 📈 预期性能指标

基于您的项目配置，预期达到以下性能：

| 指标 | 目标值 | 说明 |
|------|--------|------|
| mAP@0.5 | ≥ 85% | 总体检测精度 |
| mAP@0.5:0.95 | ≥ 70% | 严格检测精度 |
| Precision | ≥ 80% | 精确率 |
| Recall | ≥ 85% | 召回率 |
| F1-Score | ≥ 82% | 综合指标 |
| 推理速度 | ≥ 25 FPS | 实时性要求 |

## 🚀 下一步操作

1. **运行个性化下载脚本**：
   ```bash
   python download_roboflow_personal.py
   ```

2. **验证数据集**：
   ```bash
   python validate_dataset.py
   ```

3. **开始训练**：
   ```bash
   python train.py --config configs/train_personal.yaml
   ```

4. **监控训练过程**：
   ```bash
   tensorboard --logdir outputs/logs
   ```

5. **评估模型**：
   ```bash
   python evaluate.py --weights outputs/checkpoints/best.pt
   ```

