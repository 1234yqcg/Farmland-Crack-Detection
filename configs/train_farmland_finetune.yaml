data:
  dataset_yaml: ./data/dataset.yaml

model:
  num_classes: 3
  pretrained: ./outputs/road_crack_pretrain_v3/weights/best.pt
  model_scale: s

training:
  epochs: 50
  batch_size: 4
  image_size: [640, 640]
  lr: 0.0001
  min_lr: 0.00001
  weight_decay: 0.001
  num_workers: 4
  grad_clip_norm: 10.0

  optimizer:
    type: AdamW
    betas: [0.9, 0.999]

  scheduler:
    type: CosineAnnealingLR
    warmup_epochs: 5
    warmup_lr: 0.00002

  loss:
    box_loss_weight: 2.0
    cls_loss_weight: 2.0
    dfl_loss_weight: 1.5
    focal_gamma: 1.5
    focal_alpha: 0.25
    label_smoothing: 0.0

  amp:
    enabled: true
    init_scale: 65536.0
    growth_factor: 2.0
    backoff_factor: 0.5
    growth_interval: 2000

  gradient_accumulation:
    enabled: true
    steps: 2

  sampling:
    enabled: true
    background_weight: 0.2
    power: 1.0

  evaluation:
    period: 5
    conf_threshold: 0.25
    iou_threshold: 0.5

output:
  dir: ./outputs/farmland_finetune_v1
  save_period: 5
  log_interval: 20
